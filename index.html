<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kaveethu.com</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* Scanlines overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.05) 2px,
        rgba(0,0,0,0.05) 4px
      );
      pointer-events: none;
      z-index: 10;
    }

    .terminal {
      width: 100%;
      max-width: 680px;
      background: #0f0f0f;
      border: 1px solid #00ff88aa;
      border-radius: 8px;
      box-shadow:
        0 0 30px rgba(0,255,136,0.15),
        0 0 80px rgba(0,255,136,0.05);
      overflow: hidden;
    }

    /* Title bar */
    .bar {
      background: #161616;
      border-bottom: 1px solid #1f1f1f;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .dot { width: 12px; height: 12px; border-radius: 50%; }
    .dot.r { background: #ff5f57; }
    .dot.y { background: #febc2e; }
    .dot.g { background: #28c840; }
    .bar-title {
      color: #444;
      font-size: 13px;
      letter-spacing: 1px;
      margin: 0 auto;
    }

    /* Output area */
    .output {
      padding: 24px 24px 8px;
      min-height: 280px;
      max-height: 65vh;
      overflow-y: auto;
      font-size: 15px;
      line-height: 1.9;
    }
    .output::-webkit-scrollbar { width: 3px; }
    .output::-webkit-scrollbar-thumb { background: #1f3a1f; }

    .line { color: #00ff88; }
    .line.dim { color: #2a5a2a; }
    .line.white { color: #ccffcc; }
    .line.pink { color: #ff79c6; font-size: 17px; letter-spacing: 0.5px; }
    .line.echo { color: #1a6a1a; }

    /* Prompt row */
    .prompt-row {
      display: flex;
      align-items: center;
      padding: 10px 24px 22px;
      gap: 10px;
      border-top: 1px solid #151515;
      margin-top: 8px;
    }
    .ps1 { color: #2a5a2a; font-size: 14px; white-space: nowrap; }
    .ps1 span { color: #00ff88; }

    input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #00ff88;
      font-family: 'Share Tech Mono', monospace;
      font-size: 15px;
      caret-color: #00ff88;
    }
    input::placeholder { color: #1a3a1a; }

    /* Fade in animation */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(3px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade { animation: fadeIn 0.25s ease forwards; }

    /* Cursor blink on welcome */
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .blink { animation: blink 1s step-end infinite; }
  </style>
</head>
<body>

<div class="terminal">
  <div class="bar">
    <div class="dot r"></div>
    <div class="dot y"></div>
    <div class="dot g"></div>
    <span class="bar-title">kaveethu.com — terminal</span>
  </div>

  <div class="output" id="output"></div>

  <div class="prompt-row">
    <span class="ps1">visitor@<span>kaveethu</span>:~$</span>
    <input id="inp" type="text" autocomplete="off" spellcheck="false" placeholder="type a command..." />
  </div>
</div>

<script>
  const out = document.getElementById('output');
  const inp = document.getElementById('inp');

  // Add a line to output
  function line(text, cls = '', delay = 0) {
    return new Promise(res => {
      setTimeout(() => {
        const d = document.createElement('div');
        d.className = 'line fade ' + cls;
        d.textContent = text || ' ';
        out.appendChild(d);
        out.scrollTop = out.scrollHeight;
        res();
      }, delay);
    });
  }

  // Echo what user typed
  function echo(text) {
    const d = document.createElement('div');
    d.className = 'line echo fade';
    d.textContent = `visitor@kaveethu:~$ ${text}`;
    out.appendChild(d);
  }

  // Boot sequence
  async function boot() {
    await line('', '', 0);
    await line('╔══════════════════════════════════════╗', 'dim', 200);
    await line('   Welcome to Kaveethu Terminal  ', '', 400);
    await line('╚══════════════════════════════════════╝', 'dim', 600);
    await line('', '', 700);
    await line('Type  "kaveethu"  for available commands.', 'white', 900);
    await line('', '', 1000);
    inp.focus();
  }

  // Handle commands
  async function run(raw) {
    const cmd = raw.trim().replace(/['"]/g, '').toLowerCase();
    if (!cmd) return;

    echo(raw.trim());

    if (cmd === 'kaveethu') {
      await line('', '', 0);
      await line("Hiya Kaveethu here
                 Always Up  -good brew coffee,evening runs,a couple of badminton sessions
                 Always Down- cocktail to unwind !
                 Happy to connect ; )", 'pink', 80);
      await line('', '', 160);
    } else if (cmd === 'clear') {
      out.innerHTML = '';
    } else {
      await line(`command not found: "${cmd}"  —  try "kaveethu"`, 'dim', 60);
    }
  }

  inp.addEventListener('keydown', async (e) => {
    if (e.key === 'Enter') {
      const val = inp.value;
      inp.value = '';
      await run(val);
    }
  });

  boot();
</script>
</body>
</html>
